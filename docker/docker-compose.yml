services:
  neo4j:
    image: neo4j:5-community
    ports:
      - '7474:7474' # Browser
      - '7687:7687' # Bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-shipit-dev}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/init.cypher:/var/lib/neo4j/import/init.cypher
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Each backend service reads shipit.config.yaml mounted into /app. Only the
  # env vars referenced from the YAML's ${VAR} placeholders are passed in —
  # everything else lives in the committed config file. NEO4J_URI / REDIS_URL
  # override the YAML's localhost defaults with the compose-network DNS;
  # NEO4J_PASSWORD passes the host's value through to satisfy the YAML's
  # required ${NEO4J_PASSWORD} placeholder.
  api-server:
    build:
      context: ..
      dockerfile: packages/api-server/Dockerfile
    ports:
      - '3001:3001'
    volumes:
      - ../shipit.config.yaml:/app/shipit.config.yaml:ro
      - ../config/shipit-schema.yaml:/app/config/shipit-schema.yaml:ro
    environment:
      NEO4J_URI: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-shipit-dev}
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

  core-writer:
    build:
      context: ..
      dockerfile: packages/core-writer/Dockerfile
    volumes:
      - ../shipit.config.yaml:/app/shipit.config.yaml:ro
    environment:
      NEO4J_URI: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-shipit-dev}
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

  mcp-server:
    build:
      context: ..
      dockerfile: packages/mcp-server/Dockerfile
    volumes:
      - ../shipit.config.yaml:/app/shipit.config.yaml:ro
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-shipit-dev}
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: '3002'
    ports:
      - '3002:3002'
    depends_on:
      neo4j:
        condition: service_healthy

  # web-ui consumes only frontend.* and bakes it into the bundle at build
  # time (Next.js inlines NEXT_PUBLIC_* statically). Override the API URL via
  # build args so the production bundle hits api-server inside the compose
  # network rather than the YAML's localhost default.
  web-ui:
    build:
      context: ..
      dockerfile: packages/web-ui/Dockerfile
      args:
        SHIPIT_API_URL: http://api-server:3001
    ports:
      - '3000:3000'
    depends_on:
      - api-server

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
