services:
  neo4j:
    image: neo4j:5-community
    ports:
      - '7474:7474' # Browser
      - '7687:7687' # Bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-shipit-dev}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/init.cypher:/var/lib/neo4j/import/init.cypher
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api-server:
    build:
      context: ..
      dockerfile: packages/api-server/Dockerfile
    ports:
      - '3001:3001'
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-shipit-dev}
      REDIS_URL: redis://redis:6379
      PORT: 3001
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

  core-writer:
    build:
      context: ..
      dockerfile: packages/core-writer/Dockerfile
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-shipit-dev}
      REDIS_URL: redis://redis:6379
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

  mcp-server:
    build:
      context: ..
      dockerfile: packages/mcp-server/Dockerfile
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-shipit-dev}
    depends_on:
      neo4j:
        condition: service_healthy

  web-ui:
    build:
      context: ..
      dockerfile: packages/web-ui/Dockerfile
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://api-server:3001
    depends_on:
      - api-server

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
