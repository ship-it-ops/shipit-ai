name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default permissions for every job. CodeQL (`actions/missing-workflow-permissions`)
# requires an explicit block; without it GitHub falls back to the org default which
# may grant `contents: write`. Lint/typecheck/test/build/docker only need to read
# the repo. The `claude-review` job below overrides this with the wider scope it
# needs (pull-requests/issues/id-token write) — per-job blocks take precedence.
permissions:
  contents: read

# Build-time placeholders for env vars the YAML now requires. next.config.mjs
# evaluates shipit.config.yaml and substitutes ${SHIPIT_API_URL} /
# ${SHIPIT_WEB_ORIGIN}; both lost their localhost fallbacks in b5884e2 so a
# misconfigured prod deploy fails loud at boot. The web-ui build itself is
# environment-agnostic — the actual URL is supplied by the deployment, not by
# CI — so a placeholder here is safe and keeps build/lint/typecheck/test/docker
# runnable without forcing every contributor to maintain a local config.
env:
  SHIPIT_API_URL: http://localhost:3001
  SHIPIT_WEB_ORIGIN: http://localhost:3000

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check

      - run: pnpm turbo lint

      - name: Secretlint (full repo)
        run: pnpm exec secretlint --secretlintrc .secretlintrc.json "**/*"

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo test --force

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo build

  docker:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-server
            dockerfile: packages/api-server/Dockerfile
          - service: core-writer
            dockerfile: packages/core-writer/Dockerfile
          - service: mcp-server
            dockerfile: packages/mcp-server/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # AI code review — gated behind every other CI job. Skipped when the PR
  # is in draft, when the PR author is a bot (Dependabot, renovate — bot
  # PRs don't benefit from AI review and would otherwise show a failing
  # required check), when the trigger is a push to main (PRs only), or
  # when any upstream job failed. No point spending review tokens on code
  # that doesn't compile or fails its own tests.
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build, docker]
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.type != 'Bot'
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Need history reaching the base ref so the workflow-change diff
          # below can compare against it.
          fetch-depth: 0

      # The Claude action only runs against the workflow definition on the
      # default branch — a security measure so a PR can't modify the prompt
      # to exfiltrate secrets. If this PR touches `ci.yml` itself (the file
      # that defines this job), skip the review with an explanatory comment
      # instead of letting the action fail.
      - name: Detect changes to this workflow file
        id: workflow_check
        run: |
          base="${{ github.event.pull_request.base.ref }}"
          if git diff --name-only "origin/$base...HEAD" -- .github/workflows/ci.yml | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post skip notice (this workflow modified)
        if: steps.workflow_check.outputs.changed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const marker = '<!-- claude-review-skip-workflow-changed -->';
            const body = [
              marker,
              '⏭️ **Claude review skipped on this PR**',
              '',
              'This PR modifies `.github/workflows/ci.yml`, the workflow that defines this review. The automated review only runs against the workflow definition on the default branch (a safety guard so a PR cannot rewrite its own reviewer prompt), so it is suppressed here.',
              '',
              'Once this PR is merged into `main`, future PRs will be reviewed against the updated workflow. You can mention `@claude` in a comment if you want a manual review on this PR.',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Run Claude Code Review
        id: claude-review
        if: steps.workflow_check.outputs.changed != 'true'
        uses: anthropics/claude-code-action@v1
        env:
          # The ship-reviewed-prs skill auto-detects CI mode from CI=true (set
          # by GitHub Actions) and submits the review via `gh`. Give gh the
          # default workflow token — same scope the rest of CI uses.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Update a single sticky comment on each run instead of posting
          # a new comment per CI invocation — keeps the PR conversation
          # readable when reviews run repeatedly (push, rebase, retries).
          use_sticky_comment: true
          # Pull the ship-reviewed-prs skill from the ship-it-ops/ship-code
          # marketplace (multi-persona review with comment-lifecycle
          # suppression + APPROVE / REQUEST_CHANGES / COMMENT decision).
          # Marketplace manifest: .claude-plugin/marketplace.json on main.
          plugin_marketplaces: 'https://github.com/ship-it-ops/ship-code.git'
          plugins: 'ship-reviewed-prs@ship-code'
          # The skill submits in CI mode (no confirmation gate). Default exit
          # behavior: REQUEST_CHANGES exits 1 (fails the job), APPROVE and
          # COMMENT exit 0. Add `--strict` if you want COMMENT to also fail.
          prompt: '/ship-reviewed-prs ${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # Skill source: https://github.com/ship-it-ops/ship-code/tree/main/skills/ship-reviewed-prs
